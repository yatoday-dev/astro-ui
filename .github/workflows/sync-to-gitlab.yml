name: Sync to GitLab

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

# Releasing a new version pushes the `master` commit and the `vX.Y.Z` tag
# together, which fires this workflow twice at once. Both runs push the same
# refspecs (main + all tags), so without serialization they race and one fails
# with "cannot lock ref" / "reference already exists". Serialize them: the
# first run does the full sync, the second becomes an idempotent no-op.
concurrency:
  group: sync-to-gitlab
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mirror to GitLab
        run: |
          GITLAB_REPO="gitlab.dev.decmedia.net/k3s/yatoday/astro-ui.git"
          # GitHub's `master` is mirrored as `main` on GitLab so the GitLab
          # project follows its default-branch convention. Tags pass through
          # unchanged. We don't `--prune` since we only push one branch +
          # tags, so there's nothing to prune.
          git push https://oauth2:${{ secrets.GITLAB_TOKEN }}@$GITLAB_REPO \
            +refs/remotes/origin/master:refs/heads/main \
            +refs/tags/*:refs/tags/*
